<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tanzania Price Intelligence Pro - Enterprise Demo</title>
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='%2300a651'%3E%3Ccircle cx='12' cy='12' r='10' fill='%23ffffff' stroke='%2300a651' stroke-width='2'/%3E%3Cpath d='M7 18C7 18 9 14 12 14C15 14 17 18 17 18' stroke='%2300a651' stroke-width='2' stroke-linecap='round'/%3E%3Ccircle cx='9' cy='9' r='1.5' fill='%2300a651'/%3E%3Ccircle cx='15' cy='9' r='1.5' fill='%2300a651'/%3E%3Cpath d='M12 2C6.48 2 2 6.48 2 12C2 17.52 6.48 22 12 22C17.52 22 22 17.52 22 12C22 6.48 17.52 2 12 2ZM12 20C7.59 20 4 16.41 4 12C4 7.59 7.59 4 12 4C16.41 4 20 7.59 20 12C20 16.41 16.41 20 12 20Z' fill='%2300a651'/%3E%3Cpath d='M12 6L14 8L12 10L10 8L12 6Z' fill='%2300a651'/%3E%3C/svg%3E">
    <link rel="apple-touch-icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='%2300a651'%3E%3Ccircle cx='12' cy='12' r='10' fill='%23ffffff' stroke='%2300a651' stroke-width='2'/%3E%3Cpath d='M7 18C7 18 9 14 12 14C15 14 17 18 17 18' stroke='%2300a651' stroke-width='2' stroke-linecap='round'/%3E%3Ccircle cx='9' cy='9' r='1.5' fill='%2300a651'/%3E%3Ccircle cx='15' cy='9' r='1.5' fill='%2300a651'/%3E%3Cpath d='M12 2C6.48 2 2 6.48 2 12C2 17.52 6.48 22 12 22C17.52 22 22 17.52 22 12C22 6.48 17.52 2 12 2ZM12 20C7.59 20 4 16.41 4 12C4 7.59 7.59 4 12 4C16.41 4 20 7.59 20 12C20 16.41 16.41 20 12 20Z' fill='%2300a651'/%3E%3Cpath d='M12 6L14 8L12 10L10 8L12 6Z' fill='%2300a651'/%3E%3C/svg%3E">
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/axios/dist/axios.min.js"></script>
    <script src="https://unpkg.com/recharts/umd/Recharts.js"></script>
    <style>
        /* Glassmorphism Design System */
        .glass {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.37);
        }
        
        .glass-lg {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 16px 64px 0 rgba(31, 38, 135, 0.37);
        }
        
        .glass-card {
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.1) 0%, rgba(255, 255, 255, 0.05) 100%);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.18);
            border-radius: 20px;
            box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.37);
            transition: all 0.3s ease;
        }
        
        .glass-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 16px 64px 0 rgba(31, 38, 135, 0.5);
            border-color: rgba(255, 255, 255, 0.3);
        }
        
        .tanzania-gradient {
            background: linear-gradient(135deg, #00a651 0%, #0066cc 100%);
        }
        
        .hero-gradient {
            background: linear-gradient(135deg, rgba(0, 166, 81, 0.9) 0%, rgba(0, 102, 204, 0.9) 100%);
        }
        
        .float-animation {
            animation: float 6s ease-in-out infinite;
        }
        
        @keyframes float {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-20px); }
        }
        
        .pulse-animation {
            animation: pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite;
        }
        
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
        
        .slide-up {
            animation: slideUp 0.5s ease-out;
        }
        
        @keyframes slideUp {
            from { transform: translateY(100%); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }
        
        .fade-in {
            animation: fadeIn 0.8s ease-out;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
        
        .glow-green {
            box-shadow: 0 0 20px rgba(0, 166, 81, 0.5);
        }
        
        .glow-blue {
            box-shadow: 0 0 20px rgba(0, 102, 204, 0.5);
        }
        
        .text-shadow {
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.5);
        }
        
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0a0a0a;
            color: #ffffff;
            overflow-x: hidden;
        }
        
        .custom-scrollbar::-webkit-scrollbar {
            width: 8px;
        }
        
        .custom-scrollbar::-webkit-scrollbar-track {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 10px;
        }
        
        .custom-scrollbar::-webkit-scrollbar-thumb {
            background: rgba(0, 166, 81, 0.5);
            border-radius: 10px;
        }
        
        .custom-scrollbar::-webkit-scrollbar-thumb:hover {
            background: rgba(0, 166, 81, 0.7);
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;
        const axios = window.axios;

        // API Configuration
        const API_BASE_URL = 'http://localhost:8002';

        // Tanzania E-commerce Platforms Data
        const TANZANIA_PLATFORMS = [
            { name: 'Jumia Tanzania', status: 'active', icon: '🛒' },
            { name: 'Azam Pay', status: 'active', icon: '💳' },
            { name: 'Mo Kwanza', status: 'active', icon: '📱' },
            { name: 'Asas Digital', status: 'active', icon: '💻' },
            { name: 'JamboMart', status: 'active', icon: '🛍️' },
            { name: 'ZoomTanzania', status: 'maintenance', icon: '🔍' },
            { name: 'Kilimo Mart', status: 'active', icon: '🌾' },
            { name: 'Kupatana', status: 'active', icon: '🏪' }
        ];

        // Main App Component
        const App = () => {
            const [currentPage, setCurrentPage] = useState('dashboard');
            const [apiStatus, setApiStatus] = useState('checking');
            const [loading, setLoading] = useState(true);
            const [systemData, setSystemData] = useState({
                platforms: 0,
                regions: 0,
                dataPoints: 0,
                modelAccuracy: 0
            });

            useEffect(() => {
                checkApiHealth();
                loadSystemData();
            }, []);

            const checkApiHealth = async () => {
                try {
                    const response = await axios.get(`${API_BASE_URL}/health`);
                    if (response.data.status === 'healthy') {
                        setApiStatus('healthy');
                    } else {
                        setApiStatus('unhealthy');
                    }
                } catch (error) {
                    setApiStatus('unhealthy');
                }
            };

            const loadSystemData = async () => {
                try {
                    const response = await axios.get(`${API_BASE_URL}/`);
                    setSystemData({
                        platforms: response.data.platforms,
                        regions: response.data.regions,
                        dataPoints: response.data.data_points,
                        modelAccuracy: response.data.model_accuracy
                    });
                } catch (error) {
                    console.error('Error loading system data:', error);
                } finally {
                    setTimeout(() => setLoading(false), 2000);
                }
            };

            if (loading) {
                return (
                    <div className="min-h-screen flex items-center justify-center relative overflow-hidden">
                        {/* Background */}
                        <div className="absolute inset-0">
                            <div className="absolute top-20 left-20 w-72 h-72 bg-green-500/20 rounded-full blur-3xl float-animation" />
                            <div className="absolute bottom-20 right-20 w-96 h-96 bg-blue-500/20 rounded-full blur-3xl float-animation" style={{ animationDelay: '2s' }} />
                        </div>
                        
                        {/* Loading Content */}
                        <div className="relative z-10 text-center">
                            <div className="w-20 h-20 border-4 border-white border-t-transparent rounded-full mx-auto mb-8 animate-spin" />
                            <h1 className="text-4xl font-bold text-white mb-4 text-shadow">Tanzania Price Intelligence Pro</h1>
                            <p className="text-xl text-gray-300">Loading enterprise e-commerce insights...</p>
                        </div>
                    </div>
                );
            }

            return (
                <div className="min-h-screen relative">
                    {/* Background */}
                    <div className="fixed inset-0 z-0">
                        <div className="absolute inset-0 bg-gradient-to-br from-green-500/20 via-blue-500/20 to-black/40" />
                        <div 
                            className="absolute inset-0 opacity-30"
                            style={{
                                backgroundImage: `url(https://images.unsplash.com/photo-1556742049-0cfed4f6a45d?ixlib=rb-4.0.3&auto=format&fit=crop&w=1920&q=80)`,
                                backgroundSize: 'cover',
                                backgroundPosition: 'center',
                                backgroundAttachment: 'fixed'
                            }}
                        />
                        <div className="absolute inset-0 bg-gradient-to-t from-black/50 via-transparent to-transparent" />
                    </div>

                    {/* Main Content */}
                    <div className="relative z-10">
                        <Navigation 
                            currentPage={currentPage} 
                            setCurrentPage={setCurrentPage} 
                            apiStatus={apiStatus}
                            systemData={systemData}
                        />
                        
                        {apiStatus === 'unhealthy' && (
                            <div className="container mx-auto px-4 py-4">
                                <div className="glass p-4 rounded-xl border-red-500/30 bg-red-500/10">
                                    <div className="flex items-center">
                                        <div className="w-3 h-3 bg-red-500 rounded-full mr-3 pulse-animation" />
                                        <span className="text-red-100">Backend API is not responding. Some features may not work properly.</span>
                                    </div>
                                </div>
                            </div>
                        )}
                        
                        <main className="container mx-auto px-4 py-8">
                            {currentPage === 'dashboard' && <Dashboard apiStatus={apiStatus} />}
                            {currentPage === 'insights' && <MarketInsights apiStatus={apiStatus} />}
                            {currentPage === 'realtime' && <RealTimeTracking apiStatus={apiStatus} />}
                            {currentPage === 'business' && <BusinessIntelligence apiStatus={apiStatus} />}
                            {currentPage === 'predict' && <PricePrediction apiStatus={apiStatus} />}
                        </main>
                        
                        <Footer />
                    </div>
                </div>
            );
        };

        // Navigation Component
        const Navigation = ({ currentPage, setCurrentPage, apiStatus, systemData }) => {
            const [isMenuOpen, setIsMenuOpen] = useState(false);

            const navigation = [
                { name: 'Dashboard', href: 'dashboard', icon: '📊' },
                { name: 'Market Insights', href: 'insights', icon: '📈' },
                { name: 'Real-Time Tracking', href: 'realtime', icon: '⚡' },
                { name: 'Business Intelligence', href: 'business', icon: '💼' },
                { name: 'AI Prediction', href: 'predict', icon: '🤖' },
            ];

            return (
                <nav className="glass-lg sticky top-0 z-50">
                    <div className="container mx-auto px-4">
                        <div className="flex justify-between items-center h-16">
                            <div className="flex items-center">
                                <div className="flex items-center space-x-3 cursor-pointer" onClick={() => setCurrentPage('dashboard')}>
                                    <div className="w-10 h-10 tanzania-gradient rounded-lg flex items-center justify-center glow-green">
                                        <span className="text-white text-xl">🇹🇿</span>
                                    </div>
                                    <div>
                                        <h1 className="text-xl font-bold text-white text-shadow">TZ Price Intelligence Pro</h1>
                                        <p className="text-xs text-gray-300">Enterprise E-commerce AI Platform</p>
                                    </div>
                                </div>
                            </div>

                            <div className="hidden md:flex items-center space-x-6">
                                {navigation.map((item) => (
                                    <button
                                        key={item.name}
                                        onClick={() => setCurrentPage(item.href)}
                                        className={`flex items-center space-x-2 px-4 py-2 rounded-lg text-sm font-medium transition-all duration-300 ${
                                            currentPage === item.href
                                                ? 'text-white bg-white/10 border border-white/20'
                                                : 'text-gray-300 hover:text-white hover:bg-white/5'
                                        }`}
                                    >
                                        <span>{item.icon}</span>
                                        <span>{item.name}</span>
                                    </button>
                                ))}
                            </div>

                            <div className="hidden md:flex items-center space-x-4">
                                <div className="flex items-center space-x-2 text-sm">
                                    <div className={`w-2 h-2 rounded-full ${
                                        apiStatus === 'healthy' ? 'bg-green-500 pulse-animation' : 'bg-red-500'
                                    }`} />
                                    <span className="text-gray-300">
                                        {apiStatus === 'healthy' ? 'API Connected' : 'API Offline'}
                                    </span>
                                </div>
                                <div className="text-xs text-gray-400">
                                    {systemData.platforms} Platforms | {systemData.dataPoints.toLocaleString()} Data Points
                                </div>
                            </div>

                            <div className="md:hidden">
                                <button
                                    onClick={() => setIsMenuOpen(!isMenuOpen)}
                                    className="p-2 rounded-lg text-gray-300 hover:text-white hover:bg-white/10"
                                >
                                    {isMenuOpen ? '✕' : '☰'}
                                </button>
                            </div>
                        </div>
                    </div>

                    {isMenuOpen && (
                        <div className="md:hidden glass-lg border-t border-white/10">
                            <div className="px-4 py-2 space-y-1">
                                {navigation.map((item) => (
                                    <button
                                        key={item.name}
                                        onClick={() => {
                                            setCurrentPage(item.href);
                                            setIsMenuOpen(false);
                                        }}
                                        className={`flex items-center space-x-3 px-4 py-3 rounded-lg w-full text-left transition-all duration-300 ${
                                            currentPage === item.href
                                                ? 'text-white bg-white/10'
                                                : 'text-gray-300 hover:text-white hover:bg-white/5'
                                        }`}
                                    >
                                        <span>{item.icon}</span>
                                        <span>{item.name}</span>
                                    </button>
                                ))}
                            </div>
                        </div>
                    )}
                </nav>
            );
        };

        // Dashboard Component
        const Dashboard = ({ apiStatus }) => {
            const [stats, setStats] = useState({
                totalProducts: 0,
                averagePrice: 0,
                priceChange: 0,
                platformsCount: 0
            });
            const [loading, setLoading] = useState(true);

            useEffect(() => {
                loadDashboardData();
            }, []);

            const loadDashboardData = async () => {
                try {
                    const response = await axios.get(`${API_BASE_URL}/products?limit=10`);
                    if (response.data.products) {
                        const uniqueProducts = response.data.products.length;
                        const avgPrice = 15420; // Simulated
                        const platforms = 8; // From system data
                        
                        setStats({
                            totalProducts: uniqueProducts,
                            averagePrice: avgPrice,
                            priceChange: 3.2,
                            platformsCount: platforms
                        });
                    }
                } catch (error) {
                    console.error('Error loading dashboard data:', error);
                } finally {
                    setLoading(false);
                }
            };

            if (loading) {
                return (
                    <div className="flex items-center justify-center h-64">
                        <div className="w-16 h-16 border-4 border-green-500 border-t-transparent rounded-full animate-spin" />
                    </div>
                );
            }

            return (
                <div className="space-y-8 fade-in">
                    {/* Header */}
                    <div className="text-center">
                        <h1 className="text-5xl font-bold text-white mb-4 text-shadow">Enterprise Dashboard</h1>
                        <p className="text-xl text-gray-300 max-w-3xl mx-auto">
                            Real-time insights into Tanzania's e-commerce marketplace with AI-powered analytics
                        </p>
                    </div>

                    {/* Stats Grid */}
                    <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6">
                        <div className="glass-card p-6 hover:glow-green">
                            <div className="flex items-center justify-between mb-4">
                                <div className="w-12 h-12 bg-green-500/20 rounded-xl flex items-center justify-center">
                                    <span className="text-2xl">📦</span>
                                </div>
                                <span className="px-3 py-1 bg-green-500/20 text-green-400 rounded-full text-sm font-medium">
                                    +12.5%
                                </span>
                            </div>
                            <h3 className="text-3xl font-bold text-white mb-2">{stats.totalProducts.toLocaleString()}</h3>
                            <p className="text-gray-300">Active Products</p>
                        </div>

                        <div className="glass-card p-6 hover:glow-blue">
                            <div className="flex items-center justify-between mb-4">
                                <div className="w-12 h-12 bg-blue-500/20 rounded-xl flex items-center justify-center">
                                    <span className="text-2xl">💰</span>
                                </div>
                                <span className="px-3 py-1 bg-blue-500/20 text-blue-400 rounded-full text-sm font-medium">
                                    +3.2%
                                </span>
                            </div>
                            <h3 className="text-3xl font-bold text-white mb-2">TZS {stats.averagePrice.toLocaleString()}</h3>
                            <p className="text-gray-300">Average Price</p>
                        </div>

                        <div className="glass-card p-6 hover:glow-green">
                            <div className="flex items-center justify-between mb-4">
                                <div className="w-12 h-12 bg-purple-500/20 rounded-xl flex items-center justify-center">
                                    <span className="text-2xl">🛒</span>
                                </div>
                                <span className="px-3 py-1 bg-purple-500/20 text-purple-400 rounded-full text-sm font-medium">
                                    Active
                                </span>
                            </div>
                            <h3 className="text-3xl font-bold text-white mb-2">{stats.platformsCount}</h3>
                            <p className="text-gray-300">Platforms</p>
                        </div>

                        <div className="glass-card p-6 hover:glow-blue">
                            <div className="flex items-center justify-between mb-4">
                                <div className="w-12 h-12 bg-yellow-500/20 rounded-xl flex items-center justify-center">
                                    <span className="text-2xl">🤖</span>
                                </div>
                                <span className="px-3 py-1 bg-yellow-500/20 text-yellow-400 rounded-full text-sm font-medium">
                                    95%
                                </span>
                            </div>
                            <h3 className="text-3xl font-bold text-white mb-2">AI Accuracy</h3>
                            <p className="text-gray-300">Model Performance</p>
                        </div>
                    </div>

                    {/* Platforms Section */}
                    <div className="glass-card p-8">
                        <h2 className="text-2xl font-bold text-white mb-6">Tanzania E-commerce Platforms</h2>
                        <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-4">
                            {TANZANIA_PLATFORMS.map((platform, index) => (
                                <div key={index} className="glass p-4 rounded-xl border border-white/10 hover:border-white/20 transition-all duration-300">
                                    <div className="flex items-center justify-between mb-3">
                                        <div className="flex items-center space-x-3">
                                            <span className="text-2xl">{platform.icon}</span>
                                            <h3 className="text-white font-medium">{platform.name}</h3>
                                        </div>
                                        <div className={`w-2 h-2 rounded-full ${
                                            platform.status === 'active' ? 'bg-green-500 pulse-animation' : 'bg-yellow-500'
                                        }`} />
                                    </div>
                                    <div className="text-sm text-gray-400">
                                        Status: <span className={`capitalize ${
                                            platform.status === 'active' ? 'text-green-400' : 'text-yellow-400'
                                        }`}>{platform.status}</span>
                                    </div>
                                </div>
                            ))}
                        </div>
                    </div>

                    {/* Recent Activity */}
                    <div className="glass-card p-8">
                        <h2 className="text-2xl font-bold text-white mb-6">Recent Market Activity</h2>
                        <div className="space-y-4">
                            {[
                                { product: 'Rice 5kg', platform: 'Jumia Tanzania', change: '+8.5%', price: 'TZS 13,200', status: 'up' },
                                { product: 'Cooking Oil 1L', platform: 'Azam Pay', change: '+6.2%', price: 'TZS 9,200', status: 'up' },
                                { product: 'Smartphone Samsung', platform: 'Mo Kwanza', change: '-3.2%', price: 'TZS 450,000', status: 'down' },
                                { product: 'Laptop HP Pavilion', platform: 'Asas Digital', change: '+2.1%', price: 'TZS 1,250,000', status: 'up' }
                            ].map((item, index) => (
                                <div key={index} className="flex items-center justify-between p-4 glass rounded-xl border border-white/10">
                                    <div className="flex items-center space-x-4">
                                        <div className={`w-3 h-3 rounded-full ${
                                            item.status === 'up' ? 'bg-green-500' : 'bg-red-500'
                                        }`} />
                                        <div>
                                            <h4 className="text-white font-medium">{item.product}</h4>
                                            <p className="text-gray-400 text-sm">{item.platform}</p>
                                        </div>
                                    </div>
                                    <div className="text-right">
                                        <p className="text-white font-semibold">{item.price}</p>
                                        <p className={`text-sm font-medium ${
                                            item.status === 'up' ? 'text-green-400' : 'text-red-400'
                                        }`}>{item.change}</p>
                                    </div>
                                </div>
                            ))}
                        </div>
                    </div>
                </div>
            );
        };

        // Market Insights Component
        const MarketInsights = ({ apiStatus }) => {
            const [insights, setInsights] = useState({
                topGainers: [],
                topLosers: [],
                regional_analysis: []
            });

            const [loading, setLoading] = useState(true);
            const [lastUpdate, setLastUpdate] = useState(new Date());
            const [showGainers, setShowGainers] = useState(true);

            useEffect(() => {
                loadInsights();
                // Auto-refresh every 30 seconds
                const interval = setInterval(() => {
                    loadInsights();
                    setLastUpdate(new Date());
                }, 30000);

                return () => clearInterval(interval);
            }, []);

            const showDetailedPopup = (item, type) => {
                // Don't navigate, show modal instead
                const modal = document.createElement('div');
                modal.className = 'fixed inset-0 bg-black/50 flex items-center justify-center z-50 p-4';
                modal.innerHTML = `
                    <div class="glass-card p-8 max-w-md w-full">
                        <div class="flex items-center justify-between mb-6">
                            <h3 class="text-2xl font-bold text-white">
                                ${type === 'gainer' ? '📈' : '📉'} ${item.platform}
                            </h3>
                            <button onclick="this.closest('.fixed').remove()" class="text-gray-400 hover:text-white text-2xl">&times;</button>
                        </div>
                        <div class="space-y-4">
                            <div class="flex justify-between items-center p-3 glass rounded-lg">
                                <span class="text-gray-400">Current Price:</span>
                                <span class="text-white font-bold text-lg">TZS ${item.price.toLocaleString()}</span>
                            </div>
                            <div class="flex justify-between items-center p-3 glass rounded-lg">
                                <span class="text-gray-400">Change:</span>
                                <span class="font-bold text-lg ${type === 'gainer' ? 'text-green-400' : 'text-red-400'}">
                                    ${type === 'gainer' ? '+' : ''}${item.change}%
                                </span>
                            </div>
                            <div class="flex justify-between items-center p-3 glass rounded-lg">
                                <span class="text-gray-400">Volume:</span>

                                        className="w-full px-4 py-3 bg-white/10 border border-white/20 rounded-xl text-white focus:outline-none focus:border-green-500 transition-colors"
                                        required
                                    >
                                        <option value="" className="bg-gray-800">Select a platform</option>
                                        {platforms.map(platform => (
                                            <option key={platform} value={platform} className="bg-gray-800">{platform}</option>
                                        ))}
                                    </select>
                                </div>

                                <div>
                                    <label className="block text-sm font-medium text-gray-300 mb-2">Quantity</label>
                                    <input
                                        type="number"
                                        value={formData.quantity}
                                        onChange={(e) => setFormData({...formData, quantity: parseInt(e.target.value)})}
                                        min="1"
                                        className="w-full px-4 py-3 bg-white/10 border border-white/20 rounded-xl text-white focus:outline-none focus:border-green-500 transition-colors"
                                        required
                                    />
                                </div>

                                <div>
                                    <label className="block text-sm font-medium text-gray-300 mb-2">Date</label>
                                    <input
                                        type="date"
                                        value={formData.date}
                                        onChange={(e) => setFormData({...formData, date: e.target.value})}
                                        className="w-full px-4 py-3 bg-white/10 border border-white/20 rounded-xl text-white focus:outline-none focus:border-green-500 transition-colors"
                                        required
                                    />
                                </div>

                                <button
                                    type="submit"
                                    disabled={loading}
                                    className="w-full tanzania-gradient text-white font-semibold py-4 px-6 rounded-xl transition-all duration-300 hover:shadow-lg hover:glow-green disabled:opacity-50"
                                >
                                    {loading ? 'Predicting...' : '🤖 Predict Price'}
                                </button>
                            </form>
                        </div>

                        <div className="space-y-6">
                            {prediction && (
                                <div className="glass-card p-8 glow-green">
                                    <h2 className="text-2xl font-bold text-white mb-6">📊 Prediction Result</h2>
                                    
                                    <div className="text-center py-6">
                                        <div className="w-20 h-20 tanzania-gradient rounded-full flex items-center justify-center mx-auto mb-6">
                                            <span className="text-3xl">🤖</span>
                                        </div>
                                        <p className="text-sm text-gray-300 mb-2">Predicted Price</p>
                                        <p className="text-5xl font-bold text-white mb-4">
                                            TZS {prediction.predicted_price.toLocaleString()}
                                        </p>
                                        <div className="flex items-center justify-center space-x-4 mb-6">
                                            <div className="px-4 py-2 bg-green-500/20 rounded-full">
                                                <span className="text-green-400 font-medium">
                                                    {Math.round(prediction.confidence * 100)}% Confidence
                                                </span>
                                            </div>
                                            <div className="px-4 py-2 bg-blue-500/20 rounded-full">
                                                <span className="text-blue-400 font-medium">
                                                    Model v2.0
                                                </span>
                                            </div>
                                        </div>
                                        <div className="text-sm text-gray-300 space-y-1">
                                            <p><strong>Product:</strong> {prediction.product_name}</p>
                                            <p><strong>Location:</strong> {prediction.location}</p>
                                            <p><strong>Platform:</strong> {prediction.platform}</p>
                                            <p><strong>Date:</strong> {new Date(prediction.date).toLocaleDateString()}</p>
                                        </div>
                                    </div>
                                </div>
                            )}
                        </div>
                    </div>
                </div>
            );
        };

        // Footer Component
        const Footer = () => {
            return (
                <footer className="glass-lg border-t border-white/10 mt-20">
                    <div className="container mx-auto px-4 py-12">
                        <div className="grid grid-cols-1 md:grid-cols-4 gap-8">
                            <div>
                                <h3 className="text-2xl font-bold text-white mb-4">TZ Price Intelligence Pro</h3>
                                <p className="text-gray-300">
                                    Enterprise AI-powered price tracking and prediction for Tanzanian e-commerce markets
                                </p>
                            </div>
                            <div>
                                <h4 className="text-lg font-semibold text-white mb-4">Integrated Platforms</h4>
                                <ul className="space-y-2 text-gray-300">
                                    <li>Jumia Tanzania</li>
                                    <li>Azam Pay</li>
                                    <li>Mo Kwanza</li>
                                    <li>Asas Digital</li>
                                    <li>JamboMart</li>
                                    <li>Kilimo Mart</li>
                                </ul>
                            </div>
                            <div>
                                <h4 className="text-lg font-semibold text-white mb-4">Features</h4>
                                <ul className="space-y-2 text-gray-300">
                                    <li>Real-time Price Tracking</li>
                                    <li>AI Predictions</li>
                                    <li>Market Analytics</li>
                                    <li>Business Intelligence</li>
                                    <li>API Integration</li>
                                    <li>Enterprise Support</li>
                                </ul>
                            </div>
                            <div>
                                <h4 className="text-lg font-semibold text-white mb-4">Contact</h4>
                                <ul className="space-y-2 text-gray-300">
                                    <li>📧 info@tzpriceintel.com</li>
                                    <li>📱 +255 712 345 678</li>
                                    <li>📍 Dar es Salaam, Tanzania</li>
                                    <li>🌐 www.tzpriceintel.com</li>
                                </ul>
                            </div>
                        </div>
                        <div className="border-t border-white/10 mt-8 pt-8 text-center text-gray-400">
                            <p>© 2026 Tanzania Price Intelligence Pro. Built with ❤️ for Tanzanian e-commerce ecosystem</p>
                            <p className="text-sm mt-2">Enterprise Edition | Model Accuracy: 95% | Real-time Updates | AI-Powered Insights</p>
                        </div>
                    </div>
                </footer>
            );
        };

        // Render the app
        ReactDOM.render(<App />, document.getElementById('root'));
    </script>
</body>
</html>
