<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tanzania Price Intelligence System - Demo</title>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/axios/dist/axios.min.js"></script>
    <script src="https://unpkg.com/recharts/umd/Recharts.js"></script>
    <style>
        .tanzania-green { color: #00a651; }
        .tanzania-blue { color: #0066cc; }
        .bg-tanzania-green { background-color: #00a651; }
        .bg-tanzania-blue { background-color: #0066cc; }
        .hover\:bg-green-600:hover { background-color: #008942; }
        .hover\:bg-blue-700:hover { background-color: #0052a3; }
        .fade-in { animation: fadeIn 0.5s ease-in; }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .chart-container { background: white; padding: 1.5rem; border-radius: 0.5rem; box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1); }
        .tanzania-card { background: white; border-radius: 0.5rem; box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1); transition: box-shadow 0.3s; }
        .tanzania-card:hover { box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1); }
    </style>
</head>
<body class="bg-gray-50">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;
        const axios = window.axios;

        // API Configuration
        const API_BASE_URL = 'http://localhost:8001';

        // Navbar Component
        const Navbar = ({ apiStatus }) => {
            const [isMenuOpen, setIsMenuOpen] = useState(false);
            const [currentPage, setCurrentPage] = useState('dashboard');

            const navigation = [
                { name: 'Dashboard', href: 'dashboard', icon: '📊' },
                { name: 'Price Prediction', href: 'predict', icon: '🔮' },
                { name: 'Price Comparison', href: 'compare', icon: '📈' },
                { name: 'Analytics', href: 'analytics', icon: '📊' },
            ];

            return (
                <nav className="bg-white shadow-lg sticky top-0 z-50">
                    <div className="container mx-auto px-4">
                        <div className="flex justify-between items-center h-16">
                            <div className="flex items-center">
                                <div className="flex items-center space-x-3 cursor-pointer" onClick={() => setCurrentPage('dashboard')}>
                                    <div className="w-10 h-10 bg-tanzania-green rounded-lg flex items-center justify-center">
                                        <span className="text-white text-xl">🔮</span>
                                    </div>
                                    <div>
                                        <h1 className="text-xl font-bold text-gray-900">TZ Price Intelligence</h1>
                                        <p className="text-xs text-gray-500">E-commerce Price Tracking</p>
                                    </div>
                                </div>
                            </div>

                            <div className="hidden md:flex items-center space-x-8">
                                {navigation.map((item) => (
                                    <button
                                        key={item.name}
                                        onClick={() => setCurrentPage(item.href)}
                                        className={`flex items-center space-x-2 px-3 py-2 rounded-md text-sm font-medium transition-colors duration-200 ${
                                            currentPage === item.href
                                                ? 'text-tanzania-green bg-green-50'
                                                : 'text-gray-700 hover:text-tanzania-green hover:bg-green-50'
                                        }`}
                                    >
                                        <span>{item.icon}</span>
                                        <span>{item.name}</span>
                                    </button>
                                ))}
                            </div>

                            <div className="hidden md:flex items-center space-x-4">
                                <div className="flex items-center space-x-2">
                                    <div className={`w-2 h-2 rounded-full ${
                                        apiStatus === 'healthy' ? 'bg-green-500' : 'bg-red-500'
                                    }`}></div>
                                    <span className="text-sm text-gray-600">
                                        API {apiStatus === 'healthy' ? 'Connected' : 'Disconnected'}
                                    </span>
                                </div>
                            </div>

                            <div className="md:hidden">
                                <button
                                    onClick={() => setIsMenuOpen(!isMenuOpen)}
                                    className="inline-flex items-center justify-center p-2 rounded-md text-gray-700 hover:text-tanzania-green hover:bg-green-50"
                                >
                                    {isMenuOpen ? '✕' : '☰'}
                                </button>
                            </div>
                        </div>
                    </div>

                    {isMenuOpen && (
                        <div className="md:hidden bg-white border-t border-gray-200">
                            <div className="px-2 pt-2 pb-3 space-y-1">
                                {navigation.map((item) => (
                                    <button
                                        key={item.name}
                                        onClick={() => {
                                            setCurrentPage(item.href);
                                            setIsMenuOpen(false);
                                        }}
                                        className={`flex items-center space-x-2 px-3 py-2 rounded-md text-base font-medium transition-colors duration-200 w-full text-left ${
                                            currentPage === item.href
                                                ? 'text-tanzania-green bg-green-50'
                                                : 'text-gray-700 hover:text-tanzania-green hover:bg-green-50'
                                        }`}
                                    >
                                        <span>{item.icon}</span>
                                        <span>{item.name}</span>
                                    </button>
                                ))}
                            </div>
                        </div>
                    )}
                </nav>
            );
        };

        // Dashboard Component
        const Dashboard = () => {
            const [stats, setStats] = useState({
                totalProducts: 0,
                averagePrice: 0,
                priceChange: 0,
                platformsCount: 0
            });
            const [recentPrices, setRecentPrices] = useState([]);
            const [loading, setLoading] = useState(true);

            useEffect(() => {
                fetchDashboardData();
            }, []);

            const fetchDashboardData = async () => {
                try {
                    const response = await axios.get(`${API_BASE_URL}/prices?limit=10`);
                    if (response.data.prices) {
                        setRecentPrices(response.data.prices);
                        
                        const uniqueProducts = [...new Set(response.data.prices.map(p => p.product_name))].length;
                        const avgPrice = response.data.prices.reduce((sum, p) => sum + p.price, 0) / response.data.prices.length;
                        const platforms = [...new Set(response.data.prices.map(p => p.platform))].length;
                        
                        setStats({
                            totalProducts: uniqueProducts,
                            averagePrice: Math.round(avgPrice),
                            priceChange: Math.random() * 10 - 5,
                            platformsCount: platforms
                        });
                    }
                } catch (error) {
                    console.error('Error fetching dashboard data:', error);
                } finally {
                    setLoading(false);
                }
            };

            if (loading) {
                return (
                    <div className="flex items-center justify-center h-64">
                        <div className="animate-spin rounded-full h-12 w-12 border-b-2 border-tanzania-green"></div>
                    </div>
                );
            }

            return (
                <div className="space-y-6 fade-in">
                    <div>
                        <h1 className="text-3xl font-bold text-gray-900">Dashboard</h1>
                        <p className="text-gray-600 mt-2">Tanzania E-commerce Price Intelligence Overview</p>
                    </div>

                    <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6">
                        <div className="tanzania-card p-6">
                            <div className="flex items-center justify-between">
                                <div>
                                    <p className="text-sm font-medium text-gray-600">Total Products</p>
                                    <p className="text-2xl font-bold text-gray-900 mt-2">{stats.totalProducts}</p>
                                </div>
                                <div className="w-12 h-12 bg-blue-500 bg-opacity-10 rounded-full flex items-center justify-center">
                                    <span className="text-blue-500 text-xl">📦</span>
                                </div>
                            </div>
                        </div>
                        
                        <div className="tanzania-card p-6">
                            <div className="flex items-center justify-between">
                                <div>
                                    <p className="text-sm font-medium text-gray-600">Average Price</p>
                                    <p className="text-2xl font-bold text-gray-900 mt-2">TZS {stats.averagePrice.toLocaleString()}</p>
                                </div>
                                <div className="w-12 h-12 bg-green-500 bg-opacity-10 rounded-full flex items-center justify-center">
                                    <span className="text-green-500 text-xl">🛒</span>
                                </div>
                            </div>
                        </div>
                        
                        <div className="tanzania-card p-6">
                            <div className="flex items-center justify-between">
                                <div>
                                    <p className="text-sm font-medium text-gray-600">Price Trend</p>
                                    <p className="text-2xl font-bold text-gray-900 mt-2">{stats.priceChange >= 0 ? 'Up' : 'Down'}</p>
                                </div>
                                <div className="w-12 h-12 bg-green-500 bg-opacity-10 rounded-full flex items-center justify-center">
                                    <span className="text-green-500 text-xl">{stats.priceChange >= 0 ? '📈' : '📉'}</span>
                                </div>
                            </div>
                        </div>
                        
                        <div className="tanzania-card p-6">
                            <div className="flex items-center justify-between">
                                <div>
                                    <p className="text-sm font-medium text-gray-600">Platforms</p>
                                    <p className="text-2xl font-bold text-gray-900 mt-2">{stats.platformsCount}</p>
                                </div>
                                <div className="w-12 h-12 bg-purple-500 bg-opacity-10 rounded-full flex items-center justify-center">
                                    <span className="text-purple-500 text-xl">📍</span>
                                </div>
                            </div>
                        </div>
                    </div>

                    <div className="chart-container">
                        <h2 className="text-xl font-semibold mb-4 text-gray-800">Recent Price Updates</h2>
                        <div className="overflow-x-auto">
                            <table className="min-w-full divide-y divide-gray-200">
                                <thead className="bg-gray-50">
                                    <tr>
                                        <th className="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">Product</th>
                                        <th className="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">Price</th>
                                        <th className="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">Location</th>
                                        <th className="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">Platform</th>
                                        <th className="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">Date</th>
                                    </tr>
                                </thead>
                                <tbody className="bg-white divide-y divide-gray-200">
                                    {recentPrices.slice(0, 5).map((price, index) => (
                                        <tr key={index} className="hover:bg-gray-50">
                                            <td className="px-6 py-4 whitespace-nowrap text-sm font-medium text-gray-900">
                                                {price.product_name}
                                            </td>
                                            <td className="px-6 py-4 whitespace-nowrap text-sm text-gray-900">
                                                TZS {price.price.toLocaleString()}
                                            </td>
                                            <td className="px-6 py-4 whitespace-nowrap text-sm text-gray-500">
                                                {price.location}
                                            </td>
                                            <td className="px-6 py-4 whitespace-nowrap text-sm text-gray-500">
                                                <span className="px-2 inline-flex text-xs leading-5 font-semibold rounded-full bg-blue-100 text-blue-800">
                                                    {price.platform}
                                                </span>
                                            </td>
                                            <td className="px-6 py-4 whitespace-nowrap text-sm text-gray-500">
                                                {new Date(price.date).toLocaleDateString()}
                                            </td>
                                        </tr>
                                    ))}
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            );
        };

        // Price Prediction Component
        const PricePrediction = () => {
            const [formData, setFormData] = useState({
                product_name: '',
                location: '',
                platform: '',
                quantity: 1,
                date: new Date().toISOString().split('T')[0]
            });
            
            const [prediction, setPrediction] = useState(null);
            const [loading, setLoading] = useState(false);
            const [error, setError] = useState('');

            const products = ['Rice 5kg', 'Cooking Oil 1L', 'Sugar 2kg', 'Maize Flour 2kg', 'Salt 1kg'];
            const locations = ['Dar es Salaam', 'Dodoma', 'Mwanza'];
            const platforms = ['Jumia', 'ZoomTanzania'];

            const handleInputChange = (e) => {
                const { name, value } = e.target;
                setFormData(prev => ({ ...prev, [name]: value }));
            };

            const handlePredict = async (e) => {
                e.preventDefault();
                setLoading(true);
                setError('');

                try {
                    const response = await axios.post(`${API_BASE_URL}/predict`, formData);
                    setPrediction(response.data);
                } catch (err) {
                    setError('Failed to get prediction. Please try again.');
                    console.error('Prediction error:', err);
                } finally {
                    setLoading(false);
                }
            };

            return (
                <div className="space-y-6 fade-in">
                    <div>
                        <h1 className="text-3xl font-bold text-gray-900">Price Prediction</h1>
                        <p className="text-gray-600 mt-2">Predict future prices for products across Tanzanian e-commerce platforms</p>
                    </div>

                    <div className="grid grid-cols-1 lg:grid-cols-2 gap-6">
                        <div className="chart-container">
                            <h2 className="text-xl font-semibold mb-4 text-gray-800">Get Price Prediction 🔮</h2>
                            
                            <form onSubmit={handlePredict} className="space-y-4">
                                <div>
                                    <label className="block text-sm font-medium text-gray-700 mb-2">Product</label>
                                    <select
                                        name="product_name"
                                        value={formData.product_name}
                                        onChange={handleInputChange}
                                        className="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-tanzania-green"
                                        required
                                    >
                                        <option value="">Select a product</option>
                                        {products.map(product => (
                                            <option key={product} value={product}>{product}</option>
                                        ))}
                                    </select>
                                </div>

                                <div>
                                    <label className="block text-sm font-medium text-gray-700 mb-2">Location</label>
                                    <select
                                        name="location"
                                        value={formData.location}
                                        onChange={handleInputChange}
                                        className="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-tanzania-green"
                                        required
                                    >
                                        <option value="">Select a location</option>
                                        {locations.map(location => (
                                            <option key={location} value={location}>{location}</option>
                                        ))}
                                    </select>
                                </div>

                                <div>
                                    <label className="block text-sm font-medium text-gray-700 mb-2">Platform</label>
                                    <select
                                        name="platform"
                                        value={formData.platform}
                                        onChange={handleInputChange}
                                        className="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-tanzania-green"
                                        required
                                    >
                                        <option value="">Select a platform</option>
                                        {platforms.map(platform => (
                                            <option key={platform} value={platform}>{platform}</option>
                                        ))}
                                    </select>
                                </div>

                                <div>
                                    <label className="block text-sm font-medium text-gray-700 mb-2">Quantity</label>
                                    <input
                                        type="number"
                                        name="quantity"
                                        value={formData.quantity}
                                        onChange={handleInputChange}
                                        min="1"
                                        className="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-tanzania-green"
                                        required
                                    />
                                </div>

                                <div>
                                    <label className="block text-sm font-medium text-gray-700 mb-2">Date</label>
                                    <input
                                        type="date"
                                        name="date"
                                        value={formData.date}
                                        onChange={handleInputChange}
                                        className="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-tanzania-green"
                                        required
                                    />
                                </div>

                                <button
                                    type="submit"
                                    disabled={loading}
                                    className="w-full bg-tanzania-green hover:bg-green-600 text-white font-medium py-2 px-4 rounded-lg transition-colors duration-200 disabled:opacity-50"
                                >
                                    {loading ? 'Predicting...' : 'Predict Price'}
                                </button>
                            </form>

                            {error && (
                                <div className="mt-4 p-3 bg-red-100 border border-red-400 text-red-700 rounded-md">
                                    {error}
                                </div>
                            )}
                        </div>

                        <div className="space-y-6">
                            {prediction && (
                                <div className="chart-container">
                                    <h2 className="text-xl font-semibold mb-4 text-gray-800">Prediction Result 📈</h2>
                                    
                                    <div className="text-center py-6">
                                        <p className="text-sm text-gray-600 mb-2">Predicted Price</p>
                                        <p className="text-4xl font-bold text-tanzania-green">
                                            TZS {prediction.predicted_price.toLocaleString()}
                                        </p>
                                        <div className="mt-4 text-sm text-gray-600">
                                            <p><strong>Product:</strong> {prediction.product_name}</p>
                                            <p><strong>Location:</strong> {prediction.location}</p>
                                            <p><strong>Platform:</strong> {prediction.platform}</p>
                                            <p><strong>Date:</strong> {new Date(prediction.date).toLocaleDateString()}</p>
                                        </div>
                                    </div>
                                </div>
                            )}
                        </div>
                    </div>
                </div>
            );
        };

        // Main App Component
        const App = () => {
            const [currentPage, setCurrentPage] = useState('dashboard');
            const [apiStatus, setApiStatus] = useState('checking');
            const [loading, setLoading] = useState(true);

            useEffect(() => {
                checkApiHealth();
            }, []);

            const checkApiHealth = async () => {
                try {
                    const response = await axios.get(`${API_BASE_URL}/health`);
                    if (response.data.status === 'healthy') {
                        setApiStatus('healthy');
                    } else {
                        setApiStatus('unhealthy');
                    }
                } catch (error) {
                    setApiStatus('unhealthy');
                } finally {
                    setLoading(false);
                }
            };

            if (loading) {
                return (
                    <div className="min-h-screen flex items-center justify-center bg-gray-50">
                        <div className="text-center">
                            <div className="animate-spin rounded-full h-12 w-12 border-b-2 border-tanzania-green mx-auto"></div>
                            <p className="mt-4 text-gray-600">Loading Tanzania Price Intelligence System...</p>
                        </div>
                    </div>
                );
            }

            const renderPage = () => {
                switch(currentPage) {
                    case 'dashboard':
                        return <Dashboard />;
                    case 'predict':
                        return <PricePrediction />;
                    default:
                        return <Dashboard />;
                }
            };

            return (
                <div className="min-h-screen bg-gray-50">
                    <Navbar apiStatus={apiStatus} onPageChange={setCurrentPage} />
                    <main className="container mx-auto px-4 py-8">
                        {apiStatus === 'unhealthy' && (
                            <div className="bg-red-100 border border-red-400 text-red-700 px-4 py-3 rounded mb-6">
                                <strong className="font-bold">Warning:</strong>
                                <span className="block sm:inline"> Backend API is not responding. Some features may not work properly.</span>
                            </div>
                        )}
                        
                        {renderPage()}
                    </main>
                    
                    <footer className="bg-gray-800 text-white py-8 mt-12">
                        <div className="container mx-auto px-4 text-center">
                            <h3 className="text-lg font-semibold mb-2">Tanzania E-commerce Price Intelligence System</h3>
                            <p className="text-gray-400">AI-powered price tracking and prediction for Tanzanian markets</p>
                            <div className="mt-4 text-sm text-gray-500">
                                © 2026 Tanzania Price Intelligence. Built with ❤️ for Tanzanian e-commerce
                            </div>
                        </div>
                    </footer>
                </div>
            );
        };

        // Render the app
        ReactDOM.render(<App />, document.getElementById('root'));
    </script>
</body>
</html>
